<style>
  /* --- Progress Clock Header Styles --- */
  .metric-round { position: relative; width: 50px; height: 50px; display: flex; justify-content: center; align-items: center; }
  .clock-svg { transform: rotate(-90deg); position: absolute; }
  .clock-svg circle { fill: none; stroke-width: 4; stroke-linecap: round; }
  .bg-track { stroke: #F0F0F0; }
  .progress-arc { transition: stroke-dashoffset 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
  .center-text { display: flex; flex-direction: column; align-items: center; z-index: 1; text-align: center; line-height: 1; }
  .main-val { font-size: 13px; font-weight: 700; color: #0a0a0a; margin-bottom: 2px; }
  .sub-label { font-size: 7px; font-weight: 700; color: #777777; text-transform: uppercase; }

  /* Pair 1: DD & MM (Coral Red) */
  .coral-pair .progress-arc { stroke: #0052cc; }
  /* Pair 2: HH & MM (Zoho Yellow) */
  .yellow-pair .progress-arc { stroke: #FFC72C; }

  /* NEW: Logout Button Style */
  .logout-btn {
      margin-left: 12px;
      padding: 6px 12px;
      background: #FEF2F2;
      color: #ef4444;
      border: 1px solid #FCA5A5;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
  }
  .logout-btn:hover {
      background: #ef4444;
      color: white;
  }

  /* --- Mobile Responsiveness --- */
  @media (max-width: 768px) {
      .desktop-only { display: none !important; }
      .search-container { width: auto !important; background: transparent !important; border: none !important; padding: 0 !important; }
      .search-input { display: none !important; }
      .top-header { padding: 12px 16px !important; }
      .logout-btn { padding: 4px 8px; font-size: 11px; }
  }
</style>

<header class="top-header" style="display: flex; justify-content: space-between; align-items: center; padding: 12px 24px; background: #FFFFFF; border-bottom: 1px solid #E8E5E1; position: sticky; top: 0; z-index: 100;">
    
    <div style="display: flex; align-items: center; gap: 16px;">
        <button class="icon-action toggle-sidebar" onclick="window.toggleMenu()" style="background: none; border: none; color: #0a0a0a; cursor: pointer; display: none;">
            <span class="material-symbols-rounded" style="font-size: 28px;">menu</span>
        </button>

        <div style="display: flex; gap: 8px; align-items: center;">
            <div class="coral-pair metric-round desktop-only">
                <svg width="50" height="50" class="clock-svg" viewBox="0 0 50 50">
                    <circle cx="25" cy="25" r="21" class="bg-track"></circle>
                    <circle cx="25" cy="25" r="21" class="progress-arc" id="dd-arc" stroke-dasharray="131.95" stroke-dashoffset="131.95"></circle>
                </svg>
                <div class="center-text">
                    <span class="main-val" id="dd-val">--</span>
                    <span class="sub-label" id="dd-context">DD</span>
                </div>
            </div>
            <div class="coral-pair metric-round desktop-only">
                <svg width="50" height="50" class="clock-svg" viewBox="0 0 50 50">
                    <circle cx="25" cy="25" r="21" class="bg-track"></circle>
                    <circle cx="25" cy="25" r="21" class="progress-arc" id="mm-arc" stroke-dasharray="131.95" stroke-dashoffset="131.95"></circle>
                </svg>
                <div class="center-text">
                    <span class="main-val" id="mm-val">--</span>
                    <span class="sub-label" id="mm-context">MM</span>
                </div>
            </div>
            <div class="yellow-pair metric-round">
                <svg width="50" height="50" class="clock-svg" viewBox="0 0 50 50">
                    <circle cx="25" cy="25" r="21" class="bg-track"></circle>
                    <circle cx="25" cy="25" r="21" class="progress-arc" id="hh-arc" stroke-dasharray="131.95" stroke-dashoffset="131.95"></circle>
                </svg>
                <div class="center-text">
                    <span class="main-val" id="hh-val">--</span>
                    <span class="sub-label" id="hh-context">HH</span>
                </div>
            </div>
            <div class="yellow-pair metric-round">
                <svg width="50" height="50" class="clock-svg" viewBox="0 0 50 50">
                    <circle cx="25" cy="25" r="21" class="bg-track"></circle>
                    <circle cx="25" cy="25" r="21" class="progress-arc" id="min-arc" stroke-dasharray="131.95" stroke-dashoffset="131.95"></circle>
                </svg>
                <div class="center-text">
                    <span class="main-val" id="min-val">--</span>
                    <span class="sub-label">MIN</span>
                </div>
            </div>
        </div>
    </div>

    <div class="header-actions" style="display: flex; align-items: center; gap: 12px; margin-left: auto;">
        <div class="search-container desktop-only" style="width: 192px; background: #FAFAFA; border: 1px solid #E8E5E1; border-radius: 8px; display: flex; align-items: center; padding: 8px 12px;">
            <span class="material-symbols-rounded" style="font-size: 20px; color: #777777;">search</span>
            <input type="text" class="search-input" placeholder="Search..." style="border: none; background: transparent; outline: none; width: 100%; font-size: 13px; margin-left: 8px; color: #0a0a0a;">
        </div>
        <div class="notification-wrapper" style="position: relative; cursor: pointer; display: flex; align-items: center;">
            <span class="material-symbols-rounded" style="color: #777777; font-size: 24px;">notifications</span>
            <span style="position: absolute; top: 2px; right: 2px; width: 8px; height: 8px; background: #e16349; border-radius: 50%; border: 2px solid #FFF;"></span>
        </div>
        <div class="profile-menu" style="display: flex; align-items: center; padding-left: 12px; border-left: 1px solid #E8E5E1;">
            <div id="header-profile-icon" style="width: 34px; height: 34px; background: #fef5e8; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #e16349; font-weight: 700; font-size: 14px;">A</div>
            
            <button class="logout-btn" onclick="window.handleLogout()">Logout</button>
        </div>
    </div>
</header>

<script>
    // 1. Automatically update the profile icon letter based on who logged in
    (function() {
        if (window.currentUser) {
            const profileIcon = document.getElementById('header-profile-icon');
            if (window.currentUser.role === 'admin') {
                profileIcon.innerText = 'A'; // Admin
            } else {
                // If branch is "Branch 1", this extracts the "1" to show in the circle
                let branchNumber = window.currentUser.branch.replace('Branch ', '');
                profileIcon.innerText = branchNumber.charAt(0); 
            }
        }
    })();

    // 2. Add the global logout function
    if (!window.handleLogout) {
        window.handleLogout = function() {
            // Clear current user
            window.currentUser = null;
            
            // Hide the app and show the login screen again
            document.getElementById('app-container').style.display = 'none';
            document.getElementById('login-container').style.display = 'flex';
            
            // Clear the password field for security
            document.getElementById('loginPassword').value = '';
        };
    }
</script>
