<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CMB | Attendance</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0"/>
</head>
<body>

<div class="module-container" id="attendance-module">
    <style>
        :root { --primary: #e16349; --primary-light: #fef5e8; --bg: #F8F5F1; --surface: #ffffff; --text-main: #0a0a0a; --text-muted: #777777; --border: #E8E5E1; --grey-med: #D9D9D9; --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.03); --success: #10B981; --danger: #ef4444; --warning: #FB923C; }
        
        #attendance-module { font-family: 'Inter', sans-serif; width: 100%; max-width: 1120px; }
        #attendance-module .section-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; color: var(--text-main); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;}
        
        #attendance-module .form-card { background: var(--surface); border-radius: 20px; padding: 24px; box-shadow: var(--shadow-sm); border: 1px solid var(--border); margin-bottom: 24px; position: relative; }
        #attendance-module .form-label { display: block; font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; margin-bottom: 6px; letter-spacing: 0.5px; }
        
        #attendance-module .input-group { display: grid; grid-template-columns: 1fr; gap: 16px; margin-bottom: 16px; }
        @media (min-width: 768px) { #attendance-module .input-group { grid-template-columns: 1fr 1fr; } }
        @media (min-width: 1024px) { #attendance-module .input-group.three-cols { grid-template-columns: 1fr 1fr 1fr; } }

        #attendance-module .form-input { width: 100%; padding: 14px 16px; border-radius: 12px; border: 1px solid var(--border); font-size: 14px; color: var(--text-main); background: #FAFAFA; outline: none; transition: border 0.2s; appearance: auto; }
        #attendance-module .form-input:focus { border-color: var(--primary); background: var(--surface); }

        #attendance-module .btn-primary { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; display: inline-flex; align-items: center; gap: 6px;}
        #attendance-module .btn-primary:active { opacity: 0.8; }
        #attendance-module .btn-primary:disabled { background: var(--grey-med); cursor: not-allowed; }
        #attendance-module .btn-outline { background: var(--surface); color: var(--text-main); border: 1px solid var(--border); padding: 10px 16px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }

        /* Google Sheet Style Horizontal Scroll Table */
        #attendance-module .table-container { background: var(--surface); border-radius: 20px; box-shadow: var(--shadow-sm); border: 1px solid var(--border); overflow: hidden; margin-bottom: 24px; }
        #attendance-module .table-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 16px; }
        #attendance-module .table-responsive { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        #attendance-module .saas-table { width: 100%; min-width: 800px; border-collapse: collapse; text-align: left; }
        #attendance-module .saas-table th { padding: 12px 20px; font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; background: #FAFAFA; border-bottom: 1px solid var(--border); white-space: nowrap; }
        #attendance-module .saas-table td { padding: 16px 20px; font-size: 14px; font-weight: 500; border-bottom: 1px solid var(--border); vertical-align: middle; white-space: nowrap; }
        
        /* Status Badges */
        .badge { padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 700; text-transform: uppercase; display: inline-block; }
        .badge-present { background: rgba(16, 185, 129, 0.1); color: var(--success); }
        .badge-absent { background: rgba(239, 68, 68, 0.1); color: var(--danger); }
        .badge-leave { background: rgba(251, 146, 60, 0.1); color: var(--warning); }

        /* Summary Dashboard */
        .summary-dashboard { display: flex; gap: 12px; flex-wrap: wrap; background: #FAFAFA; padding: 12px; border-radius: 12px; border: 1px solid var(--border); }
        .summary-card { flex: 1; min-width: 120px; padding: 12px; border-radius: 8px; background: var(--surface); border: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .summary-card span { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; }
        .summary-card strong { font-size: 20px; font-weight: 800; color: var(--text-main); }
        .summary-card.present strong { color: var(--success); }
        .summary-card.absent strong { color: var(--danger); }

        /* Monthly View Matrix Styling */
        #monthTable { width: 100%; border-collapse: collapse; font-size: 11px; min-width: 1100px; }
        #monthTable th { background: #FAFAFA; color: var(--text-muted); text-transform: uppercase; font-size: 10px; padding: 8px 4px; border: 1px solid var(--border); text-align: center; }
        #monthTable td { border: 1px solid var(--border); padding: 6px 4px; text-align: center; font-weight: 600; }
        #monthTable td:nth-child(1), #monthTable td:nth-child(2), #monthTable td:nth-child(3) { text-align: left; padding-left: 10px; }
        .m-st-P { color: var(--success); }
        .m-st-A { color: var(--danger); }
        .m-st-L { color: var(--warning); }
        .m-st-H { color: #3B82F6; }
        .m-st-none { color: #ddd; font-weight: normal; }

        @media print {
            @page { size: A4 landscape; margin: 10mm; }
            body { background: white; padding: 0; }
            #sidebar-container, #header-container, #bottomnav-container, .no-print { display: none !important; }
            .main-wrapper { flex: 1; display: block; overflow: visible; }
            #main-content { padding: 0; overflow: visible; }
            
            /* Logic for printing Monthly Matrix vs Daily Log */
            body.printing-monthly #daily-entry-form, 
            body.printing-monthly #daily-log-container { display: none !important; }
            
            body:not(.printing-monthly) #monthlyReportContainer { display: none !important; }

            #attendance-module .table-container { box-shadow: none; border: none; margin: 0; }
            #attendance-module .saas-table th { background: white; color: black; border-bottom: 1px solid #000; }
            #attendance-module .saas-table td { border-bottom: 1px solid #E8E5E1; }
            
            #monthTable th, #monthTable td { border: 1px solid #000; font-size: 9px; padding: 3px; }
            #monthTable th { background: #f0f0f0 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }
    </style>

    <div class="section-title">
        <h2 style="margin: 0;">Attendance Management</h2>
        <button class="btn-outline no-print" onclick="window.openMonthlyReport()" style="border-color: var(--primary); color: var(--primary);">
            <span class="material-symbols-rounded" style="font-size: 18px;">calendar_month</span> View Monthly Matrix
        </button>
    </div>

    <!-- MONTHLY REPORT CONTAINER -->
    <div class="table-container" id="monthlyReportContainer" style="display: none;">
        <div class="table-header no-print" style="flex-direction: row; flex-wrap: wrap;">
            <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                <h4 style="margin: 0;">Monthly Attendance Report</h4>
                <div style="display: flex; gap: 8px;">
                    <!-- Monthly CSV Export Button -->
                    <button class="btn-outline no-print" onclick="window.exportMonthlyCSV()" style="padding: 6px 12px; font-size: 12px; color: var(--success); border-color: rgba(16, 185, 129, 0.5);">
                        <span class="material-symbols-rounded" style="font-size: 14px;">description</span> Export CSV
                    </button>
                    <button class="btn-primary no-print" onclick="window.printMonthlyReport()" style="padding: 6px 12px; font-size: 12px;">
                        <span class="material-symbols-rounded" style="font-size: 14px;">print</span> Print A4 Report
                    </button>
                    <button class="btn-outline no-print" onclick="document.getElementById('monthlyReportContainer').style.display='none'" style="padding: 6px 12px; font-size: 12px;">Close</button>
                </div>
            </div>
            
            <div style="display: flex; flex-wrap: wrap; gap: 10px; align-items: center; background: #FAFAFA; padding: 12px; border-radius: 8px; border: 1px solid var(--border); width: 100%;">
                <input type="month" id="reportMonth" class="form-input" style="padding: 8px; font-size: 12px; width: auto;" title="Select Month">
                <select id="reportBranch" class="form-input" style="padding: 8px; font-size: 12px; width: auto;">
                    <option value="">All Branches</option>
                </select>
                <button class="btn-outline" onclick="window.generateMonthlyReport()" style="padding: 8px 16px; font-size: 12px; background: var(--primary); color: white; border: none;">Generate Report</button>
            </div>
        </div>

        <div style="padding: 16px 20px; font-weight: 700; color: var(--primary); font-size: 16px; display: none;" id="reportPrintTitle" class="print-only">
            STRA CARE - Monthly Attendance (<span id="reportPrintMonthTxt"></span>)
        </div>

        <div class="table-responsive" style="padding: 0 20px 20px 20px;">
            <table id="monthTable">
                <thead id="monthlyHead"></thead>
                <tbody id="monthlyBody"></tbody>
            </table>
            <div id="monthlyEmptyMsg" style="text-align: center; padding: 30px; color: var(--text-muted); font-size: 13px;">Select a month and click Generate Report to view matrix.</div>
        </div>
    </div>

    <!-- DAILY ENTRY FORM -->
    <div class="form-card no-print" id="daily-entry-form">
        <form id="attendance-form" onsubmit="event.preventDefault();">
            <input type="hidden" id="attDocId" value="">

            <div class="input-group three-cols">
                <div>
                    <label class="form-label">Date *</label>
                    <input type="date" id="attDate" class="form-input" required>
                </div>
                <div>
                    <label class="form-label">Select Staff / Therapist *</label>
                    <select id="attEmployee" class="form-input" onchange="window.handleEmployeeSelect()" required>
                        <option value="">Loading Directory...</option>
                    </select>
                </div>
                <div>
                    <label class="form-label">Branch *</label>
                    <select id="attBranch" class="form-input" required>
                        <option value="">Select Branch</option>
                    </select>
                </div>
            </div>

            <div class="input-group three-cols">
                <div>
                    <label class="form-label">Attendance Status *</label>
                    <select id="attStatus" class="form-input" required>
                        <option value="Present">Present</option>
                        <option value="Absent">Absent</option>
                        <option value="Leave">On Leave</option>
                        <option value="Half-Day">Half-Day</option>
                    </select>
                </div>
                <div style="grid-column: span 2;">
                    <label class="form-label">Notes / Reason</label>
                    <input type="text" id="attNotes" class="form-input" placeholder="Any specific remarks or reason for absence...">
                </div>
            </div>

            <div style="text-align: right; margin-top: 16px;">
                <button type="button" class="btn-outline" style="margin-right: 12px; padding: 12px 24px;" onclick="window.resetAttForm()">Clear Form</button>
                <button type="button" class="btn-primary" id="saveAttBtn" onclick="window.saveAttendance()">
                    <span class="material-symbols-rounded" style="font-size: 18px;">how_to_reg</span> Save Attendance
                </button>
            </div>
        </form>
    </div>

    <!-- DAILY ATTENDANCE LOG TABLE -->
    <div class="table-container" id="daily-log-container">
        <div class="table-header">
            
            <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                <h4 style="margin: 0;">Daily Attendance Log</h4>
                <div style="display: flex; gap: 8px;">
                    <button class="btn-outline no-print" onclick="window.exportDailyAttCSV()" style="padding: 6px 12px; font-size: 12px;">
                        <span class="material-symbols-rounded" style="font-size: 14px; color: var(--success);">description</span> CSV
                    </button>
                    <button class="btn-outline no-print" onclick="window.print()" style="padding: 6px 12px; font-size: 12px;">
                        <span class="material-symbols-rounded" style="font-size: 14px; color: var(--primary);">picture_as_pdf</span> PDF Log
                    </button>
                </div>
            </div>

            <div class="summary-dashboard" id="summaryDashboard">
                <div class="summary-card">
                    <span>Total Logs</span>
                    <strong id="countTotal">0</strong>
                </div>
                <div class="summary-card present">
                    <span>Present / Half-Day</span>
                    <strong id="countPresent">0</strong>
                </div>
                <div class="summary-card absent">
                    <span>Absent / Leave</span>
                    <strong id="countAbsent">0</strong>
                </div>
            </div>

            <div class="no-print" style="display: flex; flex-wrap: wrap; gap: 10px; align-items: center; background: #fff; width: 100%;">
                <input type="date" id="filterAttDate" class="form-input" onchange="window.filterAttTable()" style="padding: 8px; font-size: 12px; width: auto;" title="Filter by Date">
                <button class="btn-outline" onclick="window.setAttFilterToday()" style="padding: 8px 12px; font-size: 12px;">Today</button>
                
                <select id="filterAttBranch" class="form-input" onchange="window.filterAttTable()" style="padding: 8px; font-size: 12px; width: auto;">
                    <option value="">All Branches</option>
                </select>

                <select id="filterAttStatus" class="form-input" onchange="window.filterAttTable()" style="padding: 8px; font-size: 12px; width: auto;">
                    <option value="">All Statuses</option>
                    <option value="present">Present</option>
                    <option value="absent">Absent</option>
                    <option value="leave">On Leave</option>
                    <option value="half-day">Half-Day</option>
                </select>

                <div style="display: flex; align-items: center; border: 1px solid var(--border); border-radius: 8px; padding: 4px 8px; flex: 1; min-width: 150px;">
                    <span class="material-symbols-rounded" style="font-size: 16px; color: var(--text-muted);">search</span>
                    <input type="text" id="attSearchInput" onkeyup="window.filterAttTable()" placeholder="Search Employee..." style="border: none; background: transparent; outline: none; font-size: 12px; width: 100%; margin-left: 6px;">
                </div>
                
                <button class="btn-outline" onclick="window.clearAttFilters()" style="padding: 8px; font-size: 12px;" title="Clear Filters">
                    <span class="material-symbols-rounded" style="font-size: 16px;">close</span>
                </button>
            </div>
        </div>

        <div class="table-responsive">
            <table class="saas-table" id="attendanceTable">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Employee Details</th>
                        <th>Branch</th>
                        <th>Status</th>
                        <th>Notes</th>
                        <th class="no-print" style="text-align: right;">Actions</th>
                    </tr>
                </thead>
                <tbody id="attTableBody">
                </tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // CMF001STRA Config
        const firebaseConfig = {
            apiKey: "AIzaSyAcO1L2Za7dzILxylmMkRTSx0FBVu_EEoM",
            authDomain: "cmf001stra.firebaseapp.com",
            projectId: "cmf001stra",
            storageBucket: "cmf001stra.firebasestorage.app",
            messagingSenderId: "763958641347",
            appId: "1:763958641347:web:316876bc2340b26bd21876",
            measurementId: "G-770FBR88LJ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        window.attDataCache = {};
        let allEmployees = [];

        // Global Format Function for DD MMM YYYY
        window.formatDateToDDMMMYYYY = function(dateStr) {
            if(!dateStr) return '';
            const parts = dateStr.split('-');
            if(parts.length !== 3) return dateStr;
            const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            const day = parts[2];
            const month = months[parseInt(parts[1], 10) - 1];
            const year = parts[0];
            return `${day} ${month} ${year}`;
        }

        // Set Default Date to Today
        const todayString = new Date().toISOString().split('T')[0];
        document.getElementById("attDate").value = todayString;
        document.getElementById("filterAttDate").value = todayString;

        // --- 1. LOAD DROPDOWNS (WITH RBAC) ---
        window.loadDropdowns = async function() {
            try {
                // 1A. Load Branches
                const branchSelect = document.getElementById('attBranch');
                const filterBranchSelect = document.getElementById('filterAttBranch');
                const reportBranchSelect = document.getElementById('reportBranch');
                
                if (window.currentUser && window.currentUser.role !== 'admin') {
                    const userBranch = window.currentUser.branch;
                    branchSelect.innerHTML = `<option value="${userBranch}">${userBranch}</option>`;
                    filterBranchSelect.innerHTML = `<option value="${userBranch}">${userBranch}</option>`;
                    reportBranchSelect.innerHTML = `<option value="${userBranch}">${userBranch}</option>`;
                    
                    branchSelect.style.pointerEvents = 'none';
                    branchSelect.style.background = 'var(--grey-med)';
                    reportBranchSelect.style.pointerEvents = 'none';
                    reportBranchSelect.style.background = 'var(--grey-med)';
                } else {
                    const bSnap = await getDocs(query(collection(db, "branches"), orderBy("name")));
                    let bHtml = '<option value="">Select Branch</option>';
                    let fHtml = '<option value="">All Branches</option>';
                    bSnap.forEach(doc => {
                        const bName = doc.data().name;
                        bHtml += `<option value="${bName}">${bName}</option>`;
                        fHtml += `<option value="${bName}">${bName}</option>`;
                    });
                    branchSelect.innerHTML = bHtml;
                    filterBranchSelect.innerHTML = fHtml;
                    reportBranchSelect.innerHTML = fHtml;
                }

                // 1B. Load Employees
                allEmployees = [];
                let tQuery = collection(db, "therapists");
                let sQuery = collection(db, "staff");
                
                if (window.currentUser && window.currentUser.role !== 'admin') {
                    tQuery = query(collection(db, "therapists"), where("branch", "==", window.currentUser.branch));
                    sQuery = query(collection(db, "staff"), where("branch", "==", window.currentUser.branch));
                }

                const tSnap = await getDocs(tQuery);
                tSnap.forEach(doc => allEmployees.push({ id: doc.id, name: doc.data().name, type: 'Therapist', branch: doc.data().branch }));
                
                const sSnap = await getDocs(sQuery);
                sSnap.forEach(doc => allEmployees.push({ id: doc.id, name: doc.data().name, type: 'Staff', branch: doc.data().branch }));
                
                allEmployees.sort((a, b) => a.name.localeCompare(b.name));

                let empHtml = '<option value="">Select Employee</option>';
                allEmployees.forEach(emp => {
                    empHtml += `<option value="${emp.id}" data-name="${emp.name}" data-type="${emp.type}" data-branch="${emp.branch}">${emp.name} (${emp.type})</option>`;
                });
                document.getElementById('attEmployee').innerHTML = empHtml;

            } catch(e) { console.error("Error loading dropdowns:", e); }
        };

        window.loadDropdowns();

        window.handleEmployeeSelect = function() {
            const select = document.getElementById('attEmployee');
            const selectedOption = select.options[select.selectedIndex];
            if(selectedOption && selectedOption.value && (!window.currentUser || window.currentUser.role === 'admin')) {
                const empBranch = selectedOption.getAttribute('data-branch');
                if(empBranch) document.getElementById('attBranch').value = empBranch;
            }
        };

        // --- MONTHLY REPORT LOGIC ---
        window.openMonthlyReport = function() {
            document.getElementById('monthlyReportContainer').style.display = 'block';
            const d = new Date();
            const yyyy = d.getFullYear();
            const mm = String(d.getMonth() + 1).padStart(2, '0');
            document.getElementById('reportMonth').value = `${yyyy}-${mm}`;
        }

        window.generateMonthlyReport = async function() {
            const monthVal = document.getElementById('reportMonth').value; // YYYY-MM
            const branchFilter = document.getElementById('reportBranch').value.toLowerCase();
            
            if(!monthVal) return alert("Please select a month first.");

            const [year, month] = monthVal.split('-');
            const daysInMonth = new Date(year, month, 0).getDate();
            
            const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            document.getElementById('reportPrintMonthTxt').innerText = `${monthNames[parseInt(month)-1]} ${year}`;

            document.getElementById('monthlyEmptyMsg').style.display = 'none';

            // Build Header
            let headHtml = `<tr><th style="width: 150px;">Branch</th><th style="width: 150px;">Name</th><th>Role</th>`;
            for(let i=1; i<=daysInMonth; i++) {
                headHtml += `<th>${i}</th>`;
            }
            headHtml += `<th>Total P</th></tr>`;
            document.getElementById('monthlyHead').innerHTML = headHtml;

            // Fetch Month Data
            let q;
            if (window.currentUser && window.currentUser.role !== 'admin') {
                q = query(collection(db, "daily_attendance"), where("branch", "==", window.currentUser.branch));
            } else {
                q = collection(db, "daily_attendance");
            }
            const snap = await getDocs(q);
            const attData = [];
            snap.forEach(d => attData.push(d.data()));

            // Filter Employees and Sort by Branch, then Name
            let filteredEmps = allEmployees;
            if (branchFilter && branchFilter !== 'all branches') {
                filteredEmps = filteredEmps.filter(e => (e.branch || '').toLowerCase() === branchFilter);
            }
            filteredEmps.sort((a, b) => {
                const branchCompare = (a.branch || '').localeCompare(b.branch || '');
                if (branchCompare !== 0) return branchCompare;
                return (a.name || '').localeCompare(b.name || '');
            });

            // Build Rows
            let bodyHtml = '';
            filteredEmps.forEach(emp => {
                let presentCount = 0;
                let rowHtml = `<tr>
                    <td>${emp.branch || '--'}</td>
                    <td>${emp.name}</td>
                    <td><span style="font-size:9px; color:#888;">${emp.type}</span></td>`;
                
                for(let i=1; i<=daysInMonth; i++) {
                    let dStr = `${year}-${month}-${String(i).padStart(2, '0')}`;
                    let record = attData.find(a => a.empId === emp.id && a.date === dStr);
                    
                    let mark = '-';
                    let cls = 'm-st-none';
                    
                    if(record) {
                        if(record.status === 'Present') { mark = 'P'; cls = 'm-st-P'; presentCount++; }
                        else if(record.status === 'Half-Day') { mark = 'H'; cls = 'm-st-H'; presentCount += 0.5; }
                        else if(record.status === 'Absent') { mark = 'A'; cls = 'm-st-A'; }
                        else if(record.status === 'Leave') { mark = 'L'; cls = 'm-st-L'; }
                    }
                    rowHtml += `<td class="${cls}">${mark}</td>`;
                }
                rowHtml += `<td style="color:var(--primary); font-weight:800;">${presentCount}</td></tr>`;
                bodyHtml += rowHtml;
            });

            if (filteredEmps.length === 0) {
                bodyHtml = `<tr><td colspan="${daysInMonth + 4}" style="padding: 20px; color: var(--text-muted);">No employees found.</td></tr>`;
            }

            document.getElementById('monthlyBody').innerHTML = bodyHtml;
        }

        window.printMonthlyReport = function() {
            const tableBody = document.getElementById('monthlyBody').innerHTML;
            if(!tableBody) return alert("Please generate the report first before printing.");
            
            document.body.classList.add('printing-monthly');
            document.getElementById('reportPrintTitle').style.display = 'block';
            
            window.print();
            
            setTimeout(() => {
                document.body.classList.remove('printing-monthly');
                document.getElementById('reportPrintTitle').style.display = 'none';
            }, 1000);
        }

        // CSV Export for Monthly Report Matrix
        window.exportMonthlyCSV = function() {
            const table = document.getElementById("monthTable");
            if (!table || table.rows.length === 0 || table.rows[0].cells.length === 0) {
                return alert("Please generate the monthly report first before exporting.");
            }
            
            let csvData = [];
            for (let i = 0; i < table.rows.length; i++) {
                let rowData = [];
                let cols = table.rows[i].querySelectorAll("td, th");
                
                for (let j = 0; j < cols.length; j++) {
                    let text = cols[j].innerText.replace(/(\r\n|\n|\r)/gm, " ").trim();
                    rowData.push('"' + text + '"');
                }
                csvData.push(rowData.join(","));
            }
            
            let monthLabel = document.getElementById('reportMonth').value || "Report";
            let csvContent = "data:text/csv;charset=utf-8," + csvData.join("\n");
            let encodedUri = encodeURI(csvContent);
            let link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `Monthly_Attendance_Matrix_${monthLabel}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // --- 2. LOAD DAILY ATTENDANCE LOG ---
        window.loadAttendanceLog = async function() {
            const tableBody = document.getElementById('attTableBody');
            tableBody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding: 20px;">Loading records...</td></tr>';

            try {
                let q;
                if (window.currentUser && window.currentUser.role !== 'admin') {
                    q = query(collection(db, "daily_attendance"), where("branch", "==", window.currentUser.branch));
                } else {
                    q = collection(db, "daily_attendance");
                }
                
                const querySnapshot = await getDocs(q);
                
                tableBody.innerHTML = ''; 
                window.attDataCache = {};
                
                if (querySnapshot.empty) {
                    tableBody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding: 20px; color: var(--text-muted);">No attendance records found.</td></tr>';
                    window.calculateTotals();
                    return;
                }

                let attList = [];
                querySnapshot.forEach(docSnap => attList.push({ id: docSnap.id, data: docSnap.data() }));
                attList.sort((a, b) => new Date(b.data.date || 0) - new Date(a.data.date || 0));

                attList.forEach((item) => {
                    const data = item.data;
                    const docId = item.id;
                    window.attDataCache[docId] = data;

                    let badgeClass = 'badge-present';
                    if (data.status === 'Absent') badgeClass = 'badge-absent';
                    else if (data.status === 'Leave' || data.status === 'Half-Day') badgeClass = 'badge-leave';

                    const tr = document.createElement('tr');
                    tr.setAttribute("data-date", data.date);
                    tr.setAttribute("data-branch", (data.branch || '').toLowerCase());
                    tr.setAttribute("data-status", data.status.toLowerCase());
                    tr.setAttribute("data-search", `${data.empName} ${data.empType}`.toLowerCase());

                    // APPLYING DD MMM YYYY FORMAT TO THE VIEW
                    const formattedDate = window.formatDateToDDMMMYYYY(data.date);

                    tr.innerHTML = `
                        <td data-label="Date"><strong>${formattedDate}</strong></td>
                        <td data-label="Employee">
                            <strong style="font-size: 15px;">${data.empName}</strong><br>
                            <span style="font-size: 12px; color: var(--text-muted);">${data.empType}</span>
                        </td>
                        <td data-label="Branch">${data.branch || '--'}</td>
                        <td data-label="Status"><span class="badge ${badgeClass}">${data.status}</span></td>
                        <td data-label="Notes"><span style="font-size: 13px; color: var(--text-muted);">${data.notes || '--'}</span></td>
                        <td class="no-print" data-label="Actions" style="text-align: right;">
                            <span class="material-symbols-rounded" style="color: var(--text-muted); cursor: pointer; font-size: 20px; margin-right: 8px;" title="Edit" onclick="window.editAtt('${docId}')">edit</span>
                            <span class="material-symbols-rounded" style="color: var(--danger); cursor: pointer; font-size: 20px;" title="Delete" onclick="window.deleteAtt('${docId}')">delete</span>
                        </td>
                    `;
                    tableBody.appendChild(tr);
                });
                
                window.filterAttTable();

            } catch (error) {
                console.error("Firebase Read Error:", error);
                tableBody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding: 20px; color: var(--danger);">Error loading data. Check Firestore rules.</td></tr>';
            }
        };

        setTimeout(() => window.loadAttendanceLog(), 500);

        // --- 3. DYNAMIC FILTERING & COUNT CALCULATION ---
        window.filterAttTable = function() {
            const dateQuery = document.getElementById("filterAttDate").value;
            const branchQuery = document.getElementById("filterAttBranch").value.toLowerCase();
            const statusQuery = document.getElementById("filterAttStatus").value.toLowerCase();
            const textQuery = document.getElementById("attSearchInput").value.toLowerCase();
            
            const trs = document.getElementById("attTableBody").getElementsByTagName("tr");

            for (let i = 0; i < trs.length; i++) {
                if (trs[i].cells.length === 1) continue; 
                
                const rowDate = trs[i].getAttribute("data-date");
                const rowBranch = trs[i].getAttribute("data-branch");
                const rowStatus = trs[i].getAttribute("data-status");
                const rowSearch = trs[i].getAttribute("data-search");

                let show = true;
                if (dateQuery && rowDate !== dateQuery) show = false;
                if (branchQuery && rowBranch !== branchQuery) show = false;
                if (statusQuery && rowStatus !== statusQuery) show = false;
                if (textQuery && rowSearch.indexOf(textQuery) === -1) show = false;

                trs[i].style.display = show ? "" : "none";
            }
            
            window.calculateTotals();
        }

        window.calculateTotals = function() {
            const trs = document.getElementById("attTableBody").getElementsByTagName("tr");
            let total = 0, present = 0, absent = 0;

            for (let i = 0; i < trs.length; i++) {
                if (trs[i].style.display !== "none" && trs[i].cells.length > 1) {
                    total++;
                    const status = trs[i].getAttribute("data-status");
                    if (status === 'present' || status === 'half-day') present++;
                    if (status === 'absent' || status === 'leave') absent++;
                }
            }

            document.getElementById('countTotal').innerText = total;
            document.getElementById('countPresent').innerText = present;
            document.getElementById('countAbsent').innerText = absent;
        }

        window.setAttFilterToday = function() {
            document.getElementById("filterAttDate").value = new Date().toISOString().split('T')[0];
            window.filterAttTable();
        }

        window.clearAttFilters = function() {
            document.getElementById("filterAttDate").value = "";
            if (window.currentUser && window.currentUser.role === 'admin') {
                document.getElementById("filterAttBranch").value = "";
            }
            document.getElementById("filterAttStatus").value = "";
            document.getElementById("attSearchInput").value = "";
            window.filterAttTable();
        }

        // --- 4. CRUD OPERATIONS ---
        window.saveAttendance = async function() {
            const saveBtn = document.getElementById('saveAttBtn');
            const docId = document.getElementById('attDocId').value;
            
            const date = document.getElementById('attDate').value;
            const selectEmp = document.getElementById('attEmployee');
            const empId = selectEmp.value;
            const branch = document.getElementById('attBranch').value;
            const status = document.getElementById('attStatus').value;
            const notes = document.getElementById('attNotes').value;

            if(!date || !empId || !branch || !status) {
                return alert("Date, Employee, Branch, and Status are required!");
            }

            const empName = selectEmp.options[selectEmp.selectedIndex].getAttribute('data-name');
            const empType = selectEmp.options[selectEmp.selectedIndex].getAttribute('data-type');

            saveBtn.innerHTML = 'Saving...';
            saveBtn.disabled = true;

            const payload = {
                date: date,
                empId: empId,
                empName: empName,
                empType: empType,
                branch: branch,
                status: status,
                notes: notes,
                updatedAt: new Date()
            };

            try {
                if(docId) {
                    await updateDoc(doc(db, "daily_attendance", docId), payload);
                    alert("Attendance record updated!");
                } else {
                    payload.createdAt = new Date();
                    await addDoc(collection(db, "daily_attendance"), payload);
                    alert("Attendance logged successfully!");
                }

                window.resetAttForm();
                window.loadAttendanceLog(); 

            } catch (error) {
                console.error("Firebase Save Error:", error);
                alert("Failed to save. Check database rules.");
            }

            saveBtn.innerHTML = '<span class="material-symbols-rounded" style="font-size: 18px;">how_to_reg</span> Save Attendance';
            saveBtn.disabled = false;
        }

        window.editAtt = function(docId) {
            const data = window.attDataCache[docId];
            if(!data) return;

            document.getElementById('attDocId').value = docId;
            document.getElementById('attDate').value = data.date;
            document.getElementById('attEmployee').value = data.empId;
            document.getElementById('attBranch').value = data.branch;
            document.getElementById('attStatus').value = data.status;
            document.getElementById('attNotes').value = data.notes || '';

            document.getElementById('saveAttBtn').innerHTML = '<span class="material-symbols-rounded" style="font-size: 18px;">update</span> Update Record';
            
            const mainContent = document.getElementById('main-content');
            if(mainContent) mainContent.scrollTo({ top: 0, behavior: 'smooth' });
            else window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.deleteAtt = async function(docId) {
            if(confirm("Are you sure you want to delete this attendance record?")) {
                try {
                    await deleteDoc(doc(db, "daily_attendance", docId));
                    window.loadAttendanceLog();
                } catch(e) {
                    alert("Error deleting record.");
                }
            }
        }

        window.resetAttForm = function() {
            document.getElementById('attendance-form').reset();
            document.getElementById('attDocId').value = '';
            document.getElementById('attDate').value = new Date().toISOString().split('T')[0];
            document.getElementById('saveAttBtn').innerHTML = '<span class="material-symbols-rounded" style="font-size: 18px;">how_to_reg</span> Save Attendance';
            
            if (window.currentUser && window.currentUser.role !== 'admin') {
                document.getElementById('attBranch').value = window.currentUser.branch;
            }
        }

        // --- 5. CSV EXPORT FOR DAILY LOG ---
        window.exportDailyAttCSV = function() {
            const table = document.getElementById("attendanceTable");
            let csvData = [];
            
            for (let i = 0; i < table.rows.length; i++) {
                if (table.rows[i].style.display === "none") continue; 
                
                let rowData = [];
                let cols = table.rows[i].querySelectorAll("td, th");
                
                let colCount = i === 0 ? cols.length - 1 : cols.length - 1; 

                for (let j = 0; j < colCount; j++) {
                    let text = cols[j].innerText.replace(/(\r\n|\n|\r)/gm, " | ").trim();
                    rowData.push('"' + text + '"');
                }
                csvData.push(rowData.join(","));
            }
            
            let csvContent = "data:text/csv;charset=utf-8," + csvData.join("\n");
            let encodedUri = encodeURI(csvContent);
            let link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `Attendance_Daily_Log.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

    </script>
</div>
