<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login | STRA CARE ERP</title>
    
    <meta name="theme-color" content="#D60000">
    <meta name="description" content="STRA CARE - Cloud ERP & CRM for Growing Business">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="assets/logo.png">
    
    <link rel="icon" type="image/png" href="assets/logo.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="auth.js"></script>

    <script>
        tailwind.config = {
            theme: { 
                extend: { 
                    fontFamily: { sans: ['Inter', 'sans-serif'] }, 
                    colors: { 
                        brand: { 
                            50: '#fef2f2', 
                            100: '#fee2e2', 
                            500: '#ef4444', 
                            600: '#0F766E', /* Updated to Stra Care Teal */
                            700: '#0D9488'  /* Darker Teal for hover states */
                        } 
                    } 
                } 
            }
        }
    </script>
    
    <style>
        /* Crossed light grey background with subtle dot pattern for the left side */
        .bg-crossed-pattern {
            background: linear-gradient(135deg, #f9fafb 50%, #f3f4f6 50%);
            position: relative;
        }
        .bg-crossed-pattern::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: radial-gradient(#e5e7eb 1.5px, transparent 1.5px);
            background-size: 24px 24px;
            opacity: 0.6;
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-white text-slate-800 font-sans antialiased min-h-screen flex flex-col md:flex-row selection:bg-brand-100 selection:text-brand-700">

    <div class="w-full md:w-5/12 lg:w-1/2 bg-crossed-pattern border-b md:border-b-0 md:border-r border-slate-200 p-10 flex flex-col justify-center items-center md:items-start text-center md:text-left min-h-[35vh] md:min-h-screen z-10 relative">
        
        <div class="relative z-10 w-full max-w-lg mx-auto md:mx-0 flex flex-col items-center md:items-start">
            <img src="assets/name.png" alt="Logo" class="h-16 w-48 object-contain mb-10 drop-shadow-sm" onerror="this.src='https://via.placeholder.com/150x50?text=STRA+CARE'">
            
            <h1 class="text-3xl md:text-4xl lg:text-5xl font-extrabold text-slate-900 leading-tight mb-4 tracking-tight">
                The One App to<br/>
                <span class="text-brand-600">Grow your Business.</span>
            </h1>
            
            <p class="text-lg md:text-xl text-slate-600 font-semibold tracking-wide uppercase">
                Count . Connect . Grow
            </p>
        </div>
    </div>

    <div class="w-full md:w-7/12 lg:w-1/2 flex items-center justify-center p-6 md:p-12 bg-white flex-grow relative z-20 shadow-[-10px_0_30px_-15px_rgba(0,0,0,0.05)] md:shadow-none">
        
        <div class="max-w-md w-full bg-white rounded-3xl p-4 sm:p-8">
            
            <div class="text-center mb-10">
                <p class="text-slate-500 text-sm mt-2 font-medium">Welcome Back</p>
                <h2 class="text-3xl font-bold text-slate-900 tracking-tight">STRA CARE</h2>
            </div>
            
            <form id="loginForm" onsubmit="handleLoginSubmit(event)" class="flex flex-col gap-6">
                
                <div id="errorMsg" class="hidden bg-red-50 text-red-600 text-sm font-bold p-3.5 rounded-xl border border-red-100 text-center flex items-center justify-center gap-2">
                    <i data-lucide="alert-circle" class="w-4 h-4"></i>
                    Invalid Username or Password.
                </div>

                <div>
                    <label class="text-xs font-bold text-slate-700 uppercase tracking-wider mb-2 block">Username</label>
                    <div class="relative">
                        <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
                        <input type="text" id="username" required placeholder="Enter username" class="w-full pl-12 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:bg-white focus:border-brand-600 focus:ring-4 focus:ring-brand-600/10 transition-all font-medium placeholder-slate-400">
                    </div>
                </div>

                <div>
                    <label class="text-xs font-bold text-slate-700 uppercase tracking-wider mb-2 block">Password</label>
                    <div class="relative">
                        <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
                        <input type="password" id="password" required placeholder="Enter password" class="w-full pl-12 pr-12 py-3.5 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:bg-white focus:border-brand-600 focus:ring-4 focus:ring-brand-600/10 transition-all font-medium placeholder-slate-400">
                        <button type="button" onclick="togglePassword()" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-brand-600 focus:outline-none transition-colors">
                            <i data-lucide="eye" id="eyeIcon" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>

                <div class="flex items-center justify-between mt-[-4px]">
                    <label class="flex items-center gap-2.5 cursor-pointer group">
                        <input type="checkbox" id="remember" class="w-4 h-4 text-brand-600 border-slate-300 rounded focus:ring-brand-500 transition-colors cursor-pointer">
                        <span class="text-sm text-slate-600 font-medium group-hover:text-slate-900 transition-colors select-none">Remember Password</span>
                    </label>
                </div>

                <button type="submit" id="loginBtn" class="mt-2 w-full py-4 bg-brand-600 hover:bg-brand-700 text-white font-bold rounded-xl transition-all shadow-[0_4px_14px_0_rgba(15,118,110,0.39)] hover:shadow-[0_6px_20px_rgba(15,118,110,0.23)] hover:-translate-y-0.5 flex justify-center items-center gap-2 text-base">
                    Sign In <i data-lucide="arrow-right" class="w-5 h-5"></i>
                </button>
            </form>
            
            <div class="mt-10 pt-6 border-t border-slate-100 text-center">
                <a href="https://cmfilings.com" target="_blank" class="inline-flex items-center gap-2 text-sm font-semibold text-slate-500 hover:text-brand-600 transition-colors">
                    <i data-lucide="headphones" class="w-4 h-4"></i>
                    Contact Support
                </a>
            </div>

        </div>
    </div>

    <script>
        lucide.createIcons();

        // Redirect if already logged in
        if (getCurrentUser()) {
            window.location.href = 'dashboard.html';
        }

        // Handle the login form submission
        function handleLoginSubmit(e) {
            e.preventDefault();
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();
            const err = document.getElementById('errorMsg');

            if (attemptLogin(u, p)) {
                err.classList.add('hidden');
                window.location.href = 'dashboard.html'; // Go to dashboard on success
            } else {
                err.classList.remove('hidden');
            }
        }

        // Toggle password visibility
        function togglePassword() {
            const pwd = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                icon.setAttribute('data-lucide', 'eye-off');
            } else {
                pwd.type = 'password';
                icon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        }
    </script>
</body>
</html>
