<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CM | Admin GST Conversion Tool</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root {
            --primary: #3B82F6;       
            --primary-hover: #2563EB; 
            --secondary: #1E3A8A;     
            --accent: #EF4444;        
            --bg: #F0F4F8;            
            --surface: #FFFFFF;       
            --text-main: #0F172A;     
            --text-muted: #64748B;    
            --border: #E2E8F0;        
            --success: #16A34A;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text-main); padding-bottom: 50px; }
        .hide { display: none !important; }

        .header { height: 65px; background: linear-gradient(135deg, #172554, #3B82F6); color: white; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 15px rgba(30, 58, 138, 0.2); }
        .left-head { display: flex; align-items: center; gap: 12px; }
        .header h1 { font-size: 20px; font-weight: 700; letter-spacing: 0.5px; margin: 0; }
        
        .container { max-width: 1200px; margin: 24px auto; padding: 0 16px; }

        .corp-card { background: var(--surface); border-radius: 12px; padding: 24px; box-shadow: 0 4px 12px rgba(15, 23, 42, 0.05); border: 1px solid var(--border); margin-bottom: 20px; }
        .card-title { font-size: 16px; font-weight: 700; color: var(--secondary); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        
        .input-group { display: flex; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
        .input-wrapper { flex: 1; min-width: 200px; }
        .input-wrapper label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; }
        .corp-input { width: 100%; background: #F8FAFC; border: 1px solid var(--border); padding: 12px 16px; border-radius: 8px; font-size: 14px; outline: none; font-weight: 500; color: var(--text-main); transition: 0.2s; }
        .corp-input:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }

        .btn-group { display: flex; gap: 12px; flex-wrap: wrap; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 8px; justify-content: center; }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-secondary { background: var(--secondary); color: white; }
        .btn-success { background: var(--success); color: white; box-shadow: 0 4px 12px rgba(22, 163, 74, 0.3); }
        .btn-danger { background: var(--accent); color: white; }
        .btn-outline { background: white; border: 1px solid var(--border); color: var(--text-main); }

        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-top: 16px; }
        .summary-box { background: #F8FAFC; border: 1px solid var(--border); border-radius: 8px; padding: 16px; text-align: center; }
        .summary-box span { font-size: 12px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; }
        .summary-box h3 { font-size: 22px; color: var(--secondary); margin-top: 4px; font-weight: 800; }
        .summary-box.total h3 { color: var(--success); }

        .tabs { display: flex; gap: 8px; border-bottom: 2px solid var(--border); margin-bottom: 16px; overflow-x: auto; }
        .tab { padding: 10px 16px; font-size: 14px; font-weight: 600; color: var(--text-muted); cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px; transition: 0.2s; white-space: nowrap; }
        .tab.active { color: var(--primary); border-bottom-color: var(--primary); }
        .paste-area { width: 100%; height: 200px; resize: vertical; font-family: monospace; font-size: 12px; white-space: pre; }

        .upload-zone { border: 2px dashed var(--border); border-radius: 12px; padding: 40px 20px; text-align: center; background: #F8FAFC; cursor: pointer; transition: 0.2s; display: block; }
        .upload-zone:hover { border-color: var(--primary); background: #EFF6FF; }
        .upload-zone i { font-size: 32px; color: var(--primary); margin-bottom: 12px; }
        .upload-zone p { font-size: 14px; color: var(--text-muted); font-weight: 500; margin: 0;}
        .upload-zone input { display: none; }
        .status-text { color: var(--success); font-weight: 700; margin-top: 10px; font-size: 13px; }

        .badges-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 16px; margin-top: 16px;}
        
        .json-output { background: #0F172A; color: #38BDF8; padding: 16px; border-radius: 8px; font-family: monospace; font-size: 12px; height: 350px; overflow-y: auto; white-space: pre-wrap; }
    </style>
</head>
<body>

    <div class="header">
        <div class="left-head">
            <i class="fa-solid fa-file-invoice" style="font-size: 24px;"></i>
            <h1>CM | Admin GST Conversion Tool</h1>
        </div>
        <div style="display: flex; align-items: center; gap: 15px;">
            <div id="datetime" style="font-size: 12px; font-weight: 600; opacity: 0.8;"></div>
            <button onclick="window.open('https://return.gst.gov.in/', '_blank')" class="btn btn-outline" style="padding: 6px 12px; font-size: 12px;">
                <i class="fa-solid fa-external-link"></i> Open GSTR Portal
            </button>
        </div>
    </div>

    <div class="container">
        
        <div class="corp-card">
            <h2 class="card-title"><i class="fa-solid fa-gear"></i> Master Details</h2>
            <div class="input-group">
                <div class="input-wrapper">
                    <label>Client Name (For File Name)</label>
                    <input type="text" id="clientName" class="corp-input" placeholder="e.g. Acme Corp">
                </div>
                <div class="input-wrapper">
                    <label>GSTIN</label>
                    <input type="text" id="gstin" class="corp-input" placeholder="e.g. 32ALTPH4176J1ZR" maxlength="15" onkeyup="this.value = this.value.toUpperCase(); document.getElementById('state_code').value = this.value.length >= 2 ? this.value.substring(0,2) : '';">
                </div>
                <div class="input-wrapper">
                    <label>Financial Period (MMYYYY)</label>
                    <input type="text" id="fp" class="corp-input" placeholder="e.g. 042026" maxlength="6">
                </div>
                <div class="input-wrapper">
                    <label>Base State Code</label>
                    <input type="text" id="state_code" class="corp-input" readonly style="background: #E2E8F0; width: 80px; text-align: center;">
                </div>
            </div>
        </div>

        <div class="corp-card">
            <h2 class="card-title"><i class="fa-solid fa-file-import"></i> Data Input</h2>
            
            <div style="display: flex; gap: 16px; margin-bottom: 20px;">
                <button id="btn-tab-upload" onclick="switchInputMode('upload')" class="btn" style="flex: 1; border: 2px solid var(--primary); color: var(--primary); background: transparent;">Excel Upload</button>
                <button id="btn-tab-paste" onclick="switchInputMode('paste')" class="btn" style="flex: 1; border: 2px solid transparent; color: var(--text-muted); background: var(--bg);">Manual Paste</button>
            </div>

            <div id="tab-upload">
                <label class="upload-zone" id="drop-zone">
                    <i class="fa-solid fa-file-excel" id="upload-icon"></i>
                    <p id="upload-text">Click to Upload GST Offline Excel Utility<br><span style="font-size: 11px; opacity: 0.7;">(Headers mapped from Row 4, Data starts Row 5)</span></p>
                    <div id="upload-status" class="status-text hide"></div>
                    <input type="file" id="excelFile" accept=".xls,.xlsx,.csv" onchange="processExcelFile()">
                </label>
            </div>

            <div id="tab-paste" class="hide">
                <div style="display: flex; gap: 10px; margin-bottom: 12px;">
                    <select id="sectionSelect" class="corp-input" style="flex: 1; margin: 0;">
                        <option value="b2b">B2B</option>
                        <option value="b2cs">B2CS</option>
                        <option value="cdnr">CDNR</option>
                        <option value="exp">EXP</option>
                        <option value="nil">NIL/EXEMP</option>
                        <option value="hsn_b2b">HSN (B2B)</option>
                        <option value="hsn_b2c">HSN (B2C)</option>
                        <option value="docs">DOCS</option>
                    </select>
                    <button onclick="processPastedSection()" class="btn btn-secondary">Process Paste</button>
                </div>
                <textarea id="pasteArea" class="corp-input paste-area" placeholder="Paste Data here (With Header Row)..."></textarea>
            </div>
        </div>

        <div class="corp-card" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px;">
            <button onclick="clearData()" class="btn btn-danger"><i class="fa-solid fa-trash"></i> Clear All Data</button>
            <div class="btn-group">
                <button onclick="downloadExcelSummary()" class="btn btn-primary" style="background: #16A34A;"><i class="fa-solid fa-file-excel"></i> Export Excel Summary</button>
                <button onclick="downloadPDFSummary()" class="btn btn-secondary"><i class="fa-solid fa-file-pdf"></i> Export PDF Summary</button>
                <button onclick="generateJSON()" class="btn btn-primary"><i class="fa-solid fa-code"></i> Generate Valid JSON</button>
            </div>
        </div>

        <div class="corp-card" id="printable-summary">
            <h2 class="card-title"><i class="fa-solid fa-chart-pie"></i> Processed Aggregates</h2>
            <div id="statusBadges" class="badges-container">
                <div style="grid-column: 1 / -1; text-align: center; padding: 20px; color: var(--text-muted); border: 2px dashed var(--border); border-radius: 8px;">
                    No data loaded yet.
                </div>
            </div>
        </div>

        <div class="corp-card">
            <h2 class="card-title"><i class="fa-solid fa-code"></i> JSON Output Preview</h2>
            <div id="json-preview" class="json-output">JSON will appear here after processing...</div>
        </div>

    </div>

    <script>
        function updateDateTime() {
            const dtElement = document.getElementById("datetime");
            if (dtElement) {
                let now = new Date();
                dtElement.innerText = now.toLocaleString('en-IN', { dateStyle: 'medium', timeStyle: 'short' });
            }
        }
        setInterval(updateDateTime, 1000);
        updateDateTime();

        let gstData = {
            b2b: [], b2cs: [], cdnr: [], exp: [], nil: { inv: [] },
            hsn: { hsn_b2b: [], hsn_b2c: [] }, doc_issue: { doc_det: [] },
            supeco: { paytx: [] },
            b2ba: [], b2cl: [], b2cla: [], b2csa: [], cdnra: [],
            cdnur: [], cdnura: [], expa: []
        };

        function getFileNameBase() {
            const gstin = document.getElementById('gstin').value.trim().toUpperCase() || 'GSTIN';
            const fp = document.getElementById('fp').value.trim() || 'MMYYYY';
            let clientName = document.getElementById('clientName').value.trim().toUpperCase();
            let formattedClient = clientName ? '_' + clientName.replace(/[^A-Z0-9\s]/g, '').replace(/\s+/g, '_') : '';
            return `GSTR1_${fp}_${gstin}${formattedClient}`;
        }

        function switchInputMode(mode) {
            document.getElementById('tab-upload').classList.toggle('hide', mode !== 'upload');
            document.getElementById('tab-paste').classList.toggle('hide', mode !== 'paste');
            const btnUp = document.getElementById('btn-tab-upload');
            const btnPa = document.getElementById('btn-tab-paste');
            if (mode === 'upload') {
                btnUp.style.borderColor = 'var(--primary)'; btnUp.style.color = 'var(--primary)';
                btnPa.style.borderColor = 'transparent'; btnPa.style.color = 'var(--text-muted)';
            } else {
                btnPa.style.borderColor = 'var(--primary)'; btnPa.style.color = 'var(--primary)';
                btnUp.style.borderColor = 'transparent'; btnUp.style.color = 'var(--text-muted)';
            }
        }

        // Core Utilities
        const cleanStr = (s) => (s !== undefined && s !== null) ? String(s).trim() : "";
        const cleanNum = (n) => {
            const val = parseFloat(n);
            return isNaN(val) ? 0 : Number(val.toFixed(2));
        };
        const extractStateCode = (pos) => cleanStr(pos).split("-")[0].trim();

        const findKey = (obj, keyword) => {
            let keys = Object.keys(obj);
            let lowerKeyword = keyword.toLowerCase();
            let exact = keys.find(k => k.toLowerCase() === lowerKeyword);
            if (exact) return exact;
            let partial = keys.find(k => k.toLowerCase().includes(lowerKeyword) && !k.toLowerCase().includes("applicable"));
            if (partial) return partial;
            return keys.find(k => k.toLowerCase().includes(lowerKeyword));
        };

        function formatExcelDate(excelVal) {
            if (!excelVal) return "";
            let dateStr = String(excelVal).trim();
            if (!isNaN(dateStr) && !dateStr.includes('-') && !dateStr.includes('/')) {
                const date = new Date(Math.round((parseFloat(dateStr) - 25569) * 86400 * 1000));
                return `${String(date.getDate()).padStart(2, '0')}-${String(date.getMonth() + 1).padStart(2, '0')}-${date.getFullYear()}`;
            }
            if (/^\d{2}-\d{2}-\d{4}$/.test(dateStr)) return dateStr;
            const months = { jan: '01', feb: '02', mar: '03', apr: '04', may: '05', jun: '06', jul: '07', aug: '08', sep: '09', oct: '10', nov: '11', dec: '12' };
            const parts = dateStr.replace(/\//g, '-').split('-');
            if (parts.length === 3) {
                let d = parts[0].padStart(2, '0');
                let m = isNaN(parts[1]) ? months[parts[1].toLowerCase()] : parts[1].padStart(2, '0');
                let y = parts[2].length === 2 ? "20" + parts[2] : parts[2];
                if (d && m && y) return `${d}-${m}-${y}`;
            }
            return dateStr;
        }

        function normalizeRows(rows) {
            return rows.map(row => {
                let normalized = {};
                for (let k in row) normalized[k.toLowerCase().trim()] = row[k];
                return normalized;
            }).filter(row => Object.keys(row).length > 0);
        }

        function tsvToObjects(tsvText) {
            const rows = tsvText.replace(/\r/g, '').split('\n').filter(r => r.trim().length > 0);
            if (rows.length < 2) return [];
            const headers = rows[0].split('\t').map(h => cleanStr(h).toLowerCase());
            const data = [];
            for (let i = 1; i < rows.length; i++) {
                const values = rows[i].split('\t');
                let obj = {};
                let hasData = false;
                headers.forEach((header, index) => {
                    let val = values[index] || "";
                    obj[header] = val;
                    if (val.trim() !== "") hasData = true; 
                });
                if (hasData) data.push(obj);
            }
            return data;
        }

        // --- CORE PARSER ENGINE ---
        function parseSectionData(section, rows, userStateCode) {
            if (!rows || rows.length === 0) return;

            try {
                if (section === 'b2cs') {
                    let arr = [];
                    rows.forEach(row => {
                        let posRaw = row[findKey(row, "place of supply")] || row[findKey(row, "place")];
                        let pos = extractStateCode(posRaw);
                        let rtRaw = row[findKey(row, "rate")];
                        let rt = rtRaw !== undefined && rtRaw !== "" ? cleanNum(rtRaw) : 0;
                        let txval = cleanNum(row[findKey(row, "taxable value")] || row[findKey(row, "taxable")]);
                        if (!pos || txval === 0) return;

                        let typRaw = cleanStr(row[findKey(row, "type")]);
                        let typ = typRaw.toLowerCase().includes("e-commerce") ? "E" : "OE";
                        let csamt = cleanNum(row[findKey(row, "cess")]);
                        let sply_ty = (pos === userStateCode) ? "INTRA" : "INTER";

                        let b2csObj = { sply_ty: sply_ty, rt: rt, typ: typ, pos: pos, txval: txval, csamt: csamt };

                        let taxAmt = Number((txval * rt / 100).toFixed(2));
                        if (sply_ty === "INTRA") {
                            b2csObj.camt = Number((taxAmt / 2).toFixed(2));
                            b2csObj.samt = Number((taxAmt / 2).toFixed(2));
                            b2csObj.iamt = 0;
                        } else {
                            b2csObj.iamt = taxAmt;
                            b2csObj.camt = 0;
                            b2csObj.samt = 0;
                        }

                        let existing = arr.find(item => item.pos === pos && item.rt === rt && item.typ === typ);
                        if (existing) {
                            existing.txval = Number((existing.txval + b2csObj.txval).toFixed(2));
                            if (sply_ty === "INTRA") {
                                existing.camt = Number((existing.camt + b2csObj.camt).toFixed(2));
                                existing.samt = Number((existing.samt + b2csObj.samt).toFixed(2));
                            } else {
                                existing.iamt = Number((existing.iamt + b2csObj.iamt).toFixed(2));
                            }
                            existing.csamt = Number((existing.csamt + b2csObj.csamt).toFixed(2));
                        } else {
                            arr.push(b2csObj);
                        }
                    });
                    gstData.b2cs = arr;
                }
                else if (section === 'b2b') {
                    let map = {};
                    rows.forEach(row => {
                        let ctin = cleanStr(row[findKey(row, "gstin")]);
                        let inum = cleanStr(row[findKey(row, "invoice number")]);
                        if (!ctin || !inum) return;

                        let idt = formatExcelDate(row[findKey(row, "invoice date")]);
                        let val = cleanNum(row[findKey(row, "invoice value")]);
                        let pos = extractStateCode(row[findKey(row, "place of supply")]);
                        let rchrg = cleanStr(row[findKey(row, "reverse charge")]) || "N";
                        let inv_typ = cleanStr(row[findKey(row, "invoice type")]) || "R";
                        if (inv_typ.toLowerCase().includes("regular")) inv_typ = "R";

                        let rt = cleanNum(row[findKey(row, "rate")]);
                        let txval = cleanNum(row[findKey(row, "taxable value")]);
                        let csamt = cleanNum(row[findKey(row, "cess")]);

                        if (!map[ctin]) map[ctin] = { ctin, inv: [] };
                        let invObj = map[ctin].inv.find(i => i.inum === inum);
                        if (!invObj) {
                            invObj = { inum, idt, val, pos, rchrg, inv_typ, itms: [] };
                            map[ctin].inv.push(invObj);
                        }

                        let taxAmt = Number((txval * rt / 100).toFixed(2));
                        
                        // FIX: Ensure csamt is strictly attached even if 0
                        let itm_det = { txval, rt, csamt: csamt || 0 }; 
                        
                        if (pos === userStateCode) {
                            itm_det.camt = Number((taxAmt / 2).toFixed(2));
                            itm_det.samt = Number((taxAmt / 2).toFixed(2));
                        } else {
                            itm_det.iamt = taxAmt;
                        }
                        invObj.itms.push({ num: invObj.itms.length + 1, itm_det });
                    });
                    gstData.b2b = Object.values(map);
                }
                else if (section === 'b2cl') {
                    let map = {};
                    rows.forEach(row => {
                        let inum = cleanStr(row[findKey(row, "invoice number")]);
                        if (!inum) return;

                        let pos = extractStateCode(row[findKey(row, "place of supply")]);
                        let idt = formatExcelDate(row[findKey(row, "invoice date")]);
                        let val = cleanNum(row[findKey(row, "invoice value")]);
                        let rt = cleanNum(row[findKey(row, "rate")]);
                        let txval = cleanNum(row[findKey(row, "taxable value")]);
                        let csamt = cleanNum(row[findKey(row, "cess")]);

                        if (!map[pos]) map[pos] = { pos, inv: [] };
                        let invObj = map[pos].inv.find(i => i.inum === inum);
                        if (!invObj) {
                            invObj = { inum, idt, val, itms: [] };
                            map[pos].inv.push(invObj);
                        }
                        // FIX: Ensure csamt
                        let itm_det = { txval, rt, iamt: Number((txval * rt / 100).toFixed(2)), csamt: csamt || 0 };
                        invObj.itms.push({ num: invObj.itms.length + 1, itm_det });
                    });
                    gstData.b2cl = Object.values(map);
                }
                else if (section === 'cdnr') {
                    let map = {};
                    rows.forEach(row => {
                        let ctin = cleanStr(row[findKey(row, "gstin")]);
                        let nt_num = cleanStr(row[findKey(row, "note number")]);
                        if (!ctin || !nt_num) return;
                        
                        let nt_dt = formatExcelDate(row[findKey(row, "note date")]);
                        let ntty = cleanStr(row[findKey(row, "note type")]).charAt(0).toUpperCase();
                        let val = cleanNum(row[findKey(row, "note value")]);
                        let pos = extractStateCode(row[findKey(row, "place of supply")]);
                        let rt = cleanNum(row[findKey(row, "rate")]);
                        let txval = cleanNum(row[findKey(row, "taxable value")]);
                        let csamt = cleanNum(row[findKey(row, "cess")]);

                        if (!map[ctin]) map[ctin] = { ctin, nt: [] };
                        let ntObj = map[ctin].nt.find(n => n.nt_num === nt_num);
                        if (!ntObj) { 
                            ntObj = { nt_num, nt_dt, ntty, val, pos, rchrg: "N", inv_typ: "R", itms: [] }; 
                            map[ctin].nt.push(ntObj); 
                        }

                        let taxAmt = Number((txval * rt / 100).toFixed(2));
                        
                        // FIX: Ensure csamt
                        let itm_det = { txval, rt, csamt: csamt || 0 };
                        
                        if (pos === userStateCode) {
                            itm_det.camt = Number((taxAmt / 2).toFixed(2));
                            itm_det.samt = Number((taxAmt / 2).toFixed(2));
                            itm_det.iamt = 0;
                        } else {
                            itm_det.iamt = taxAmt;
                        }
                        ntObj.itms.push({ num: ntObj.itms.length + 1, itm_det });
                    });
                    gstData.cdnr = Object.values(map);
                }
                else if (section === 'cdnur') {
                    let arr = [];
                    rows.forEach(row => {
                        let nt_num = cleanStr(row[findKey(row, "note number")]);
                        if (!nt_num) return;

                        let typRaw = cleanStr(row[findKey(row, "ur type")]).toUpperCase();
                        let typ = typRaw.includes("B2CL") ? "B2CL" : "EXPWP";
                        let nt_dt = formatExcelDate(row[findKey(row, "note date")]);
                        let ntty = cleanStr(row[findKey(row, "note type")]).charAt(0).toUpperCase();
                        let val = cleanNum(row[findKey(row, "note value")]);
                        let pos = extractStateCode(row[findKey(row, "place of supply")]);
                        let rt = cleanNum(row[findKey(row, "rate")]);
                        let txval = cleanNum(row[findKey(row, "taxable value")]);
                        let csamt = cleanNum(row[findKey(row, "cess")]);

                        let taxAmt = Number((txval * rt / 100).toFixed(2));
                        
                        // FIX: Ensure csamt
                        let itm_det = { txval, rt, csamt: csamt || 0 };
                        if (pos === userStateCode) {
                            itm_det.camt = Number((taxAmt / 2).toFixed(2));
                            itm_det.samt = Number((taxAmt / 2).toFixed(2));
                        } else {
                            itm_det.iamt = taxAmt;
                        }

                        arr.push({ typ, nt: [{ nt_num, nt_dt, ntty, val, pos, itms: [{ num: 1, itm_det }] }] });
                    });
                    gstData.cdnur = arr;
                }
                else if (section === 'exp') {
                    let map = {};
                    rows.forEach(row => {
                        let exp_typRaw = cleanStr(row[findKey(row, "export type")]);
                        let inum = cleanStr(row[findKey(row, "invoice number")]);
                        if (!exp_typRaw || !inum) return;

                        let exp_typ = exp_typRaw.includes("Without") ? "WOPAY" : "WPAY";
                        let idt = formatExcelDate(row[findKey(row, "invoice date")]);
                        let val = cleanNum(row[findKey(row, "invoice value")]);
                        let rt = cleanNum(row[findKey(row, "rate")]);
                        let txval = cleanNum(row[findKey(row, "taxable value")]);
                        let csamt = cleanNum(row[findKey(row, "cess")]);

                        if (!map[exp_typ]) map[exp_typ] = { exp_typ, inv: [] };
                        let invObj = map[exp_typ].inv.find(i => i.inum === inum);
                        if (!invObj) {
                            invObj = { inum, idt, val, itms: [] };
                            map[exp_typ].inv.push(invObj);
                        }
                        
                        // FIX: Enforce iamt and csamt explicitly for EXP schema validation
                        let itm_det = { 
                            txval: txval, 
                            rt: rt, 
                            csamt: csamt || 0, 
                            iamt: (exp_typ === "WOPAY") ? Number((txval * rt / 100).toFixed(2)) : 0 
                        };
                        invObj.itms.push(itm_det);
                    });
                    gstData.exp = Object.values(map);
                }
                else if (section === 'exemp' || section === 'nil') {
                    let invArray = [];
                    rows.forEach(row => {
                        let sply_raw = cleanStr(row[findKey(row, "supply type")] || row[findKey(row, "description")] || row[findKey(row, "type")]);
                        if (!sply_raw) return;

                        let code = "INTRB2B";
                        let rawLow = sply_raw.toLowerCase();
                        if (rawLow.includes("inter") && rawLow.includes("unregistered")) code = "INTRB2C";
                        else if (rawLow.includes("intra") && rawLow.includes("unregistered")) code = "INTRAB2C";
                        else if (rawLow.includes("inter") && rawLow.includes("registered")) code = "INTRB2B";
                        else if (rawLow.includes("intra") && rawLow.includes("registered")) code = "INTRAB2B";

                        invArray.push({
                            sply_ty: code,
                            expt_amt: cleanNum(row[findKey(row, "exempted")]),
                            nil_amt: cleanNum(row[findKey(row, "nil")]),
                            ngsup_amt: cleanNum(row[findKey(row, "non-gst")] || row[findKey(row, "non gst")])
                        });
                    });
                    gstData.nil.inv = invArray;
                }
                else if (section === 'hsn_b2b' || section === 'hsn_b2c') {
                    let arr = [];
                    let count = 1;
                    rows.forEach(row => {
                        let hsn_sc = cleanStr(row[findKey(row, "hsn")]);
                        if (!hsn_sc) return;

                        let uqcRaw = cleanStr(row[findKey(row, "uqc")]);
                        let uqc = uqcRaw.includes('-') ? uqcRaw.split('-')[0].trim() : uqcRaw;

                        arr.push({
                            num: count++,
                            hsn_sc: hsn_sc,
                            desc: cleanStr(row[findKey(row, "description")]),
                            uqc: uqc,
                            qty: cleanNum(row[findKey(row, "quantity")]),
                            rt: cleanNum(row[findKey(row, "rate")]),
                            txval: cleanNum(row[findKey(row, "taxable value")]),
                            iamt: cleanNum(row[findKey(row, "integrated")]),
                            camt: cleanNum(row[findKey(row, "central")]),
                            samt: cleanNum(row[findKey(row, "state")]),
                            csamt: cleanNum(row[findKey(row, "cess")])
                        });
                    });
                    if (section === 'hsn_b2b') gstData.hsn.hsn_b2b = arr;
                    else gstData.hsn.hsn_b2c = arr;
                }
                else if (section === 'eco' || section === 'supeco') {
                    let arr = [];
                    rows.forEach(row => {
                        let etin = cleanStr(row[findKey(row, "ecommerce")] || row[findKey(row, "etin")] || row[findKey(row, "gstin")]);
                        if (!etin) return;
                        arr.push({
                            etin: etin,
                            suppval: cleanNum(row[findKey(row, "value")] || row[findKey(row, "suppval")]),
                            igst: cleanNum(row[findKey(row, "integrated")] || row[findKey(row, "igst")]),
                            cgst: cleanNum(row[findKey(row, "central")] || row[findKey(row, "cgst")]),
                            sgst: cleanNum(row[findKey(row, "state")] || row[findKey(row, "sgst")]),
                            cess: cleanNum(row[findKey(row, "cess")])
                        });
                    });
                    gstData.supeco.paytx = arr;
                }
                else if (['b2ba', 'b2cla', 'b2csa', 'cdnra', 'cdnura', 'expa'].includes(section)) {
                    let arr = [];
                    rows.forEach(row => {
                        let obj = {};
                        Object.keys(row).forEach(k => {
                            if (k !== '__rowNum__') obj[k.toLowerCase().replace(/ /g, '_')] = row[k];
                        });
                        if (Object.keys(obj).length > 0) arr.push(obj);
                    });
                    gstData[section] = arr;
                }
                else if (section === 'docs') {
                    let map = {};
                    rows.forEach(row => {
                        let doc_typRaw = row[findKey(row, "nature of document")] || row[findKey(row, "nature")];
                        let doc_typ = cleanStr(doc_typRaw);
                        if (!doc_typ) return;

                        const docTypes = [
                            "Invoices for outward supply", "Invoices for inward supply from unregistered person",
                            "Revised Invoice", "Debit Note", "Credit Note", "Receipt Voucher",
                            "Payment Voucher", "Refund Voucher", "Delivery Challan for job work",
                            "Delivery Challan for supply on approval", "Delivery Challan in case of liquid gas",
                            "Delivery Challan in cases other than by way of supply"
                        ];
                        let doc_num = docTypes.indexOf(doc_typ) + 1;
                        if (doc_num === 0) doc_num = 1;

                        if (!map[doc_typ]) map[doc_typ] = { doc_num, doc_typ, docs: [] };

                        let fromVal = cleanStr(row[findKey(row, "from")]);
                        let toVal = cleanStr(row[findKey(row, "to")]);
                        let totnum = cleanNum(row[findKey(row, "total number")] || row[findKey(row, "total")]);
                        let cancel = cleanNum(row[findKey(row, "cancelled")] || row[findKey(row, "cancel")]);

                        if (fromVal) {
                            map[doc_typ].docs.push({
                                num: map[doc_typ].docs.length + 1,
                                to: String(toVal),
                                from: String(fromVal),
                                totnum: totnum,
                                cancel: cancel,
                                net_issue: totnum - cancel
                            });
                        }
                    });
                    gstData.doc_issue.doc_det = Object.values(map);
                }
            } catch (error) {
                console.error(`Error parsing ${section}:`, error);
                throw new Error(`Failed parsing ${section}`);
            }
        }

        function calculateAggregates() {
            let agg = {
                b2b: { count: 0, txval: 0, iamt: 0, camt: 0, samt: 0 },
                b2cl: { count: 0, txval: 0, iamt: 0, camt: 0, samt: 0 },
                b2cs: { count: 0, txval: 0, iamt: 0, camt: 0, samt: 0 },
                cdnr: { count: 0, txval: 0, iamt: 0, camt: 0, samt: 0 },
                cdnur: { count: 0, txval: 0, iamt: 0, camt: 0, samt: 0 },
                exp: { count: 0, txval: 0, iamt: 0, camt: 0, samt: 0 },
                exemp: { count: 0, txval: 0 },
                hsn_b2b: { count: 0, txval: 0, iamt: 0, camt: 0, samt: 0 },
                hsn_b2c: { count: 0, txval: 0, iamt: 0, camt: 0, samt: 0 },
                eco: { count: 0, txval: 0, iamt: 0, camt: 0, samt: 0 },
                docs: { count: 0 },
                b2ba: { count: gstData.b2ba.length },
                b2cla: { count: gstData.b2cla.length },
                b2csa: { count: gstData.b2csa.length },
                cdnra: { count: gstData.cdnra.length },
                cdnura: { count: gstData.cdnura.length },
                expa: { count: gstData.expa.length }
            };

            gstData.b2b.forEach(ctin => {
                agg.b2b.count += ctin.inv.length;
                ctin.inv.forEach(inv => inv.itms.forEach(itm => {
                    agg.b2b.txval += itm.itm_det.txval || 0;
                    agg.b2b.iamt += itm.itm_det.iamt || 0;
                    agg.b2b.camt += itm.itm_det.camt || 0;
                    agg.b2b.samt += itm.itm_det.samt || 0;
                }));
            });

            gstData.b2cl.forEach(pos => {
                agg.b2cl.count += pos.inv.length;
                pos.inv.forEach(inv => inv.itms.forEach(itm => {
                    agg.b2cl.txval += itm.itm_det.txval || 0;
                    agg.b2cl.iamt += itm.itm_det.iamt || 0;
                }));
            });

            gstData.b2cs.forEach(item => {
                agg.b2cs.count++;
                agg.b2cs.txval += item.txval || 0;
                agg.b2cs.iamt += item.iamt || 0;
                agg.b2cs.camt += item.camt || 0;
                agg.b2cs.samt += item.samt || 0;
            });

            gstData.cdnr.forEach(ctin => {
                agg.cdnr.count += ctin.nt.length;
                ctin.nt.forEach(nt => nt.itms.forEach(itm => {
                    agg.cdnr.txval += itm.itm_det.txval || 0;
                    agg.cdnr.iamt += itm.itm_det.iamt || 0;
                    agg.cdnr.camt += itm.itm_det.camt || 0;
                    agg.cdnr.samt += itm.itm_det.samt || 0;
                }));
            });

            gstData.cdnur.forEach(typ => {
                agg.cdnur.count += typ.nt.length;
                typ.nt.forEach(nt => nt.itms.forEach(itm => {
                    agg.cdnur.txval += itm.itm_det.txval || 0;
                    agg.cdnur.iamt += itm.itm_det.iamt || 0;
                    agg.cdnur.camt += itm.itm_det.camt || 0;
                    agg.cdnur.samt += itm.itm_det.samt || 0;
                }));
            });

            gstData.exp.forEach(et => {
                agg.exp.count += et.inv.length;
                et.inv.forEach(inv => inv.itms.forEach(itm => {
                    agg.exp.txval += itm.txval || 0;
                    agg.exp.iamt += itm.iamt || 0;
                }));
            });

            if (gstData.nil.inv) {
                gstData.nil.inv.forEach(n => {
                    agg.exemp.count++;
                    agg.exemp.txval += (n.expt_amt || 0) + (n.nil_amt || 0) + (n.ngsup_amt || 0);
                });
            }

            if (gstData.hsn.hsn_b2b) {
                gstData.hsn.hsn_b2b.forEach(h => {
                    agg.hsn_b2b.count++;
                    agg.hsn_b2b.txval += h.txval || 0;
                    agg.hsn_b2b.iamt += h.iamt || 0;
                    agg.hsn_b2b.camt += h.camt || 0;
                    agg.hsn_b2b.samt += h.samt || 0;
                });
            }

            if (gstData.hsn.hsn_b2c) {
                gstData.hsn.hsn_b2c.forEach(h => {
                    agg.hsn_b2c.count++;
                    agg.hsn_b2c.txval += h.txval || 0;
                    agg.hsn_b2c.iamt += h.iamt || 0;
                    agg.hsn_b2c.camt += h.camt || 0;
                    agg.hsn_b2c.samt += h.samt || 0;
                });
            }

            if (gstData.supeco.paytx) {
                gstData.supeco.paytx.forEach(eco => {
                    agg.eco.count++;
                    agg.eco.txval += eco.suppval || 0;
                    agg.eco.iamt += eco.igst || 0;
                    agg.eco.camt += eco.cgst || 0;
                    agg.eco.samt += eco.sgst || 0;
                });
            }

            if (gstData.doc_issue.doc_det) {
                gstData.doc_issue.doc_det.forEach(d => {
                    d.docs.forEach(doc => { agg.docs.count += doc.net_issue || 0; });
                });
            }

            return agg;
        }

            const keys = [
                'b2b', 'b2cl', 'b2cs', 'cdnr', 'cdnur', 'exp', 'exemp', 'hsn_b2b', 'hsn_b2c', 'docs', 'eco',

            ];
            const labels = {
                b2b: '1. B2B', b2cl: '11. B2CL', b2cs: '2. B2CS', cdnr: '3. CDNR', cdnur: '15. CDNUR', exp: '4. EXP',
                exemp: '5. EXEMP', hsn_b2b: '6. HSN (B2B)', hsn_b2c: '7. HSN (B2C)', docs: '8. DOCS', eco: '9. ECO (SUPECO)',

                        <div class="font-bold text-navy border-b border-gray-200 pb-2 mb-2 flex justify-between items-center" style="display:flex; justify-content:space-between; border-bottom: 1px solid #e2e8f0; padding-bottom:8px; margin-bottom:8px;">
                            <span class="tracking-wide text-xs" style="font-weight:700; color:var(--secondary);">${labels[k]}</span>
                            <span class="text-[10px] font-bold bg-cmRed text-white px-2 py-0.5 rounded shadow-sm" style="background:var(--primary); color:white; padding:2px 6px; border-radius:4px; font-size:11px;">CNT: ${data.count}</span>
                        </div>`;

                    if (!['docs', 'b2ba', 'b2cla', 'b2csa', 'cdnra', 'cdnura', 'expa'].includes(k)) {
                        html += `<div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:6px;"><span style="color:var(--text-muted);">Taxable:</span> <span style="font-weight:700;">₹${data.txval.toLocaleString('en-IN', { minimumFractionDigits: 2 })}</span></div>`;

                        if (['b2b', 'b2cs', 'cdnr', 'cdnur', 'eco', 'hsn_b2b', 'hsn_b2c'].includes(k)) {
                            html += `<div style="display:flex; justify-content:space-between; font-size:11px; color:var(--text-muted); margin-bottom:2px;"><span>IGST:</span> <span>₹${data.iamt.toLocaleString('en-IN', { minimumFractionDigits: 2 })}</span></div>`;
                            html += `<div style="display:flex; justify-content:space-between; font-size:11px; color:var(--text-muted); margin-bottom:2px;"><span>CGST:</span> <span>₹${data.camt.toLocaleString('en-IN', { minimumFractionDigits: 2 })}</span></div>`;
                            html += `<div style="display:flex; justify-content:space-between; font-size:11px; color:var(--text-muted);"><span>SGST:</span> <span>₹${data.samt.toLocaleString('en-IN', { minimumFractionDigits: 2 })}</span></div>`;
                        }
                        if (['exp', 'b2cl'].includes(k)) {
                            html += `<div style="display:flex; justify-content:space-between; font-size:11px; color:var(--text-muted);"><span>IGST:</span> <span>₹${data.iamt.toLocaleString('en-IN', { minimumFractionDigits: 2 })}</span></div>`;
                        }
                    } else if (k === 'docs') {
                        html += `<div style="font-size:12px; margin-top:8px;">Total Net Issued: <span style="font-weight:700;">${data.count}</span></div>`;
                    } else {
                        html += `<div style="font-size:12px; margin-top:8px;">Records Captured.</div>`;
                    }

                    html += `</div>`;
                    container.innerHTML += html;
                }

                container.innerHTML = `<div style="grid-column: 1 / -1; text-align: center; padding: 20px; color: var(--text-muted); border: 2px dashed var(--border); border-radius: 8px;">No data loaded yet.</div>`;
            }
        }

        // --- EXCEL PROCESSING ---
        function processExcelFile() {
            const fileInput = document.getElementById('excelFile');
            const gstinInput = document.getElementById('gstin').value.trim();
            if(gstinInput.length < 2) { alert("Please enter valid GSTIN before uploading."); fileInput.value = ''; return; }

            const userStateCode = gstinInput.substring(0, 2);
            const reader = new FileReader();

            document.getElementById('upload-text').classList.add('hide');
            const stat = document.getElementById('upload-status');
            stat.innerText = 'Processing...';
            stat.classList.remove('hide');

            reader.onload = function(e) {
                try {
                    const workbook = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
                    
                    const sheetMapping = {
                        'b2b': 'b2b', 'b2b,sez,de': 'b2b',
                        'b2cs': 'b2cs',
                        'cdnr': 'cdnr',
                        'exp': 'exp',
                        'nil': 'exemp', 'exemp': 'exemp', 'nilrated': 'exemp',
                        'hsn(b2b)': 'hsn_b2b',
                        'hsn(b2c)': 'hsn_b2c',
                        'docs': 'docs',
                        'eco': 'eco',
                        'b2ba': 'b2ba',
                        'b2cl': 'b2cl',
                        'b2cla': 'b2cla',
                        'b2csa': 'b2csa',
                        'cdnra': 'cdnra',
                        'cdnur': 'cdnur',
                        'cdnura': 'cdnura',
                        'expa': 'expa'
                    };

                    let processedCount = 0;
                    workbook.SheetNames.forEach(sheetName => {
                        let cleanName = sheetName.toLowerCase().replace(/ /g, '');
                        let targetSection = sheetMapping[cleanName] || sheetMapping[sheetName.toLowerCase()];
                        
                        if(targetSection) {
                            let rawRows = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName], {
                                range: 3, 
                                defval: ""
                            });
                            
                            let normalizedRows = normalizeRows(rawRows);
                            
                            if (normalizedRows.length > 0) {
                                parseSectionData(targetSection, normalizedRows, userStateCode);
                                processedCount++;
                            }
                        }
                    });
                    renderSummaryCards();
                    stat.innerText = `Success! Extracted data from ${processedCount} mapped sheets.`;
                } catch (error) {
                    console.error(error);
                    stat.innerText = "Error reading Excel.";
                    alert("Error reading Excel. Please ensure it's the standard GSTR-1 template.");
                }
            };
            reader.readAsArrayBuffer(fileInput.files[0]);
        }

        // --- PASTE PROCESSING ---
        function processPastedSection() {
            const gstinInput = document.getElementById('gstin').value.trim();
            if(gstinInput.length < 2) { alert("Please enter valid GSTIN."); return; }

            const userStateCode = gstinInput.substring(0, 2);
            const section = document.getElementById('sectionSelect').value;
            const text = document.getElementById('pasteArea').value;
            
            if(!text) { alert("Please paste data first."); return; }

            const rows = tsvToObjects(text);
            if(rows.length === 0) { alert("Could not parse data. Ensure you include the header row."); return; }

            try {
                parseSectionData(section, rows, userStateCode);
                renderSummaryCards();
                document.getElementById('pasteArea').value = "";
                alert(`${section.toUpperCase()} section added to memory successfully!`);
            } catch (error) {
                alert(`Error parsing data. Make sure copied columns match ${section.toUpperCase()} format.`);
            }
        }

        // --- EXCEL EXPORT SUMMARY ---
        function downloadExcelSummary() {
            const agg = calculateAggregates();
            let hasData = false;
            Object.values(agg).forEach(val => { if (val.count > 0) hasData = true; });
            
            if (!hasData) {
                alert("No data processed! Please load data first.");
                return;
            }

            const wb = XLSX.utils.book_new();
            const baseName = getFileNameBase();

            const summaryData = [
                ["GSTIN:", document.getElementById('gstin').value.trim()],
                ["Period:", document.getElementById('fp').value.trim()],
                ["Client Name:", document.getElementById('clientName').value.trim()],
                [],
                ["Section", "Record Count", "Taxable Value", "IGST", "CGST", "SGST"]
            ];

            const keys = ['b2b', 'b2cl', 'b2cs', 'cdnr', 'cdnur', 'exp', 'exemp', 'hsn_b2b', 'hsn_b2c', 'docs', 'eco'];
            keys.forEach(k => {
                if(agg[k] && agg[k].count > 0) {
                    summaryData.push([
                        k.toUpperCase(), 
                        agg[k].count, 
                        agg[k].txval || 0, 
                        agg[k].iamt || 0, 
                        agg[k].camt || 0, 
                        agg[k].samt || 0
                    ]);
                }
            });

            const wsSummary = XLSX.utils.aoa_to_sheet(summaryData);
            XLSX.utils.book_append_sheet(wb, wsSummary, "Summary");

            if (gstData.b2cs.length > 0) XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(gstData.b2cs), "B2CS");
            if (gstData.hsn.hsn_b2b && gstData.hsn.hsn_b2b.length > 0) XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(gstData.hsn.hsn_b2b), "HSN_B2B");
            if (gstData.hsn.hsn_b2c && gstData.hsn.hsn_b2c.length > 0) XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(gstData.hsn.hsn_b2c), "HSN_B2C");
            if (gstData.supeco.paytx && gstData.supeco.paytx.length > 0) XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(gstData.supeco.paytx), "SUPECO");
            if (gstData.nil.inv && gstData.nil.inv.length > 0) XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(gstData.nil.inv), "NIL_RATED");
            
            const exportB2B = [];
            gstData.b2b.forEach(ctin => {
                ctin.inv.forEach(inv => {
                    inv.itms.forEach(itm => {
                        exportB2B.push({
                            GSTIN: ctin.ctin, Invoice_No: inv.inum, Date: inv.idt, Value: inv.val, 
                            POS: inv.pos, Rev_Charge: inv.rchrg, Inv_Type: inv.inv_typ,
                            Rate: itm.itm_det.rt, Taxable: itm.itm_det.txval,
                            IGST: itm.itm_det.iamt || 0, CGST: itm.itm_det.camt || 0, SGST: itm.itm_det.samt || 0
                        });
                    });
                });
            });
            if(exportB2B.length > 0) XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(exportB2B), "B2B_Processed");

            const exportCDNR = [];
            gstData.cdnr.forEach(ctin => {
                ctin.nt.forEach(nt => {
                    nt.itms.forEach(itm => {
                        exportCDNR.push({
                            GSTIN: ctin.ctin, Note_No: nt.nt_num, Date: nt.nt_dt, Type: nt.ntty,
                            Value: nt.val, POS: nt.pos, Rate: itm.itm_det.rt, Taxable: itm.itm_det.txval,
                            IGST: itm.itm_det.iamt || 0, CGST: itm.itm_det.camt || 0, SGST: itm.itm_det.samt || 0
                        });
                    });
                });
            });
            if(exportCDNR.length > 0) XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(exportCDNR), "CDNR_Processed");

            XLSX.writeFile(wb, `${baseName}.xlsx`);
        }

        // --- STRICT VALID JSON GENERATION ---
        function generateJSON() {
            const gstinInput = document.getElementById('gstin').value.trim().toUpperCase();
            const fpInput = document.getElementById('fp').value.trim();

            if (gstinInput.length !== 15 || fpInput.length !== 6) {
                alert("Valid 15-digit GSTIN and 6-digit Return Period (MMYYYY) are required to generate JSON.");
                return;
            }

            const finalJson = { gstin: gstinInput, fp: fpInput, version: "GST3.2.4", hash: "hash" };

            if (gstData.b2b.length > 0) finalJson.b2b = gstData.b2b;
            if (gstData.b2cs.length > 0) finalJson.b2cs = gstData.b2cs;
            if (gstData.nil.inv && gstData.nil.inv.length > 0) finalJson.nil = gstData.nil;
            if (gstData.exp.length > 0) finalJson.exp = gstData.exp;
            if (gstData.cdnr.length > 0) finalJson.cdnr = gstData.cdnr;
            if (gstData.cdnur.length > 0) finalJson.cdnur = gstData.cdnur;
            if (gstData.doc_issue.doc_det && gstData.doc_issue.doc_det.length > 0) finalJson.doc_issue = gstData.doc_issue;
            
            // FIX: Remove empty arrays entirely from HSN
            let hsnObj = {};
            let hasHsn = false;
            
            if (gstData.hsn.hsn_b2b && gstData.hsn.hsn_b2b.length > 0) {
                hsnObj.hsn_b2b = gstData.hsn.hsn_b2b;
                hasHsn = true;
            }
            if (gstData.hsn.hsn_b2c && gstData.hsn.hsn_b2c.length > 0) {
                hsnObj.hsn_b2c = gstData.hsn.hsn_b2c;
                hasHsn = true;
            }
            
            if(hasHsn) {
                finalJson.hsn = hsnObj;
            }

            if (gstData.supeco.paytx && gstData.supeco.paytx.length > 0) finalJson.supeco = gstData.supeco;

            // Extra amendment sections
            if (gstData.b2ba.length > 0) finalJson.b2ba = gstData.b2ba;
            if (gstData.b2cl.length > 0) finalJson.b2cl = gstData.b2cl;
            if (gstData.b2cla.length > 0) finalJson.b2cla = gstData.b2cla;
            if (gstData.b2csa.length > 0) finalJson.b2csa = gstData.b2csa;
            if (gstData.cdnra.length > 0) finalJson.cdnra = gstData.cdnra;
            if (gstData.cdnura.length > 0) finalJson.cdnura = gstData.cdnura;
            if (gstData.expa.length > 0) finalJson.expa = gstData.expa;

            if (Object.keys(finalJson).length === 4) { // Only base meta fields exist
                alert("No data processed! Please upload a file or paste data before downloading.");
                return;
            }

            // Print preview inside the app
            document.getElementById('json-preview').innerText = JSON.stringify(finalJson, null, 4);
            document.getElementById('btn-download').classList.remove('hide');

            const jsonString = JSON.stringify(finalJson);
            const blob = new Blob([jsonString], { type: "application/json" });
            const url = URL.createObjectURL(blob);

            const a = document.createElement('a');
            a.href = url;
            a.download = `${getFileNameBase()}_offline.json`;
            document.body.appendChild(a);
            a.click();

            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
